<script>
  const container = document.getElementById("grupos");
  Object.values(GRUPOS).forEach((g) => {
    const pilotos = COMPETIDORES.filter((c) => c.grupo === g.id && c.participa !== false);
    const cards = pilotos.map((p) => {
      const tbd = p.nome === "A definir" ? "tbd" : "";
      return `
        <div class="card pilot" style="--pcolor:${p.cor}">
          <div class="avatar">${p.emoji}</div>
          <div class="nome ${tbd}">${p.nome}${p.anfitriao ? " 🎙️" : ""}</div>
          <div class="personagem">${p.personagem}</div>
          <div class="grp-badge ${g.classe}">${g.nome}</div>
        </div>`;
    }).join("");

    container.insertAdjacentHTML("beforeend", `
      <div class="group-header">
        <span class="tag" style="background:${g.cor}">${g.nome}</span>
        <span style="color:#6b5f3e">${g.lema}</span>
      </div>
      <div class="cards">${cards}</div>
    `);
  });
</script>
